<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>부동산 실거래가 지도</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0f1117; --panel: #181c27; --panel2: #1e2335;
    --border: #2a3050; --accent: #4f8ef7; --accent2: #f7c948;
    --text: #e8eaf0; --text2: #8892aa;
  }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  header { display: flex; align-items: center; gap: 16px; padding: 12px 20px; background: var(--panel); border-bottom: 1px solid var(--border); z-index: 100; flex-shrink: 0; }
  .logo { font-size: 18px; font-weight: 700; color: var(--accent); white-space: nowrap; }
  .logo span { color: var(--text2); font-weight: 300; font-size: 13px; margin-left: 8px; }
  .search-bar { display: flex; align-items: center; background: var(--panel2); border: 1px solid var(--border); border-radius: 8px; padding: 0 12px; gap: 8px; flex: 1; max-width: 400px; }
  .search-bar input { background: none; border: none; outline: none; color: var(--text); font-size: 14px; font-family: inherit; padding: 9px 0; width: 100%; }
  .search-bar input::placeholder { color: var(--text2); }
  .search-bar button { background: var(--accent); border: none; border-radius: 6px; color: white; cursor: pointer; padding: 5px 12px; font-size: 13px; font-family: inherit; white-space: nowrap; }
  .header-actions { display: flex; gap: 8px; margin-left: auto; align-items: center; }
  .btn { background: var(--panel2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); cursor: pointer; padding: 8px 14px; font-size: 13px; font-family: inherit; display: flex; align-items: center; gap: 6px; transition: border-color 0.2s; white-space: nowrap; }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .stats-pill { background: var(--panel2); border: 1px solid var(--border); border-radius: 20px; padding: 6px 14px; font-size: 12px; color: var(--text2); white-space: nowrap; }
  .stats-pill strong { color: var(--accent2); font-family: 'DM Mono', monospace; }
  .main { display: flex; flex: 1; overflow: hidden; }
  .sidebar { width: 300px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }
  .sidebar-section { padding: 16px; border-bottom: 1px solid var(--border); }
  .section-title { font-size: 11px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--text2); margin-bottom: 12px; }
  .filter-group { margin-bottom: 14px; }
  .filter-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
  .filter-label span { color: var(--accent2); font-family: 'DM Mono', monospace; font-size: 12px; }
  .range-slider { -webkit-appearance: none; width: 100%; height: 4px; border-radius: 2px; background: var(--border); outline: none; margin-bottom: 4px; }
  .range-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: var(--accent); cursor: pointer; border: 2px solid var(--bg); }
  .checkbox-group { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { background: var(--panel2); border: 1px solid var(--border); border-radius: 6px; padding: 5px 10px; font-size: 12px; cursor: pointer; transition: all 0.15s; user-select: none; color: var(--text2); }
  .chip.active { background: rgba(79,142,247,0.15); border-color: var(--accent); color: var(--accent); }
  .list-header { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 12px; color: var(--text2); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
  .csv-hint { padding: 10px 16px; font-size: 11px; color: var(--text2); border-bottom: 1px solid var(--border); line-height: 1.6; background: rgba(79,142,247,0.05); }
  .csv-hint code { background: var(--panel2); padding: 1px 5px; border-radius: 3px; font-family: 'DM Mono', monospace; color: var(--accent2); font-size: 10px; }
  .deal-list { overflow-y: auto; flex: 1; }
  .deal-list::-webkit-scrollbar { width: 4px; }
  .deal-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .deal-item { padding: 12px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s; }
  .deal-item:hover { background: var(--panel2); }
  .deal-item.active { background: rgba(79,142,247,0.1); border-left: 3px solid var(--accent); }
  .deal-item-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
  .deal-name { font-size: 13px; font-weight: 500; }
  .deal-price { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; }
  .deal-item-bottom { display: flex; gap: 6px; font-size: 11px; color: var(--text2); flex-wrap: wrap; }
  .deal-tag { background: var(--panel2); border-radius: 4px; padding: 2px 6px; }
  .map-area { flex: 1; display: flex; flex-direction: column; position: relative; }
  #map { flex: 1; }
  .roadview-panel { height: 0; overflow: hidden; transition: height 0.3s; position: relative; background: #000; }
  .roadview-panel.open { height: 280px; }
  #roadview { width: 100%; height: 100%; }
  .roadview-close { position: absolute; top: 8px; right: 8px; z-index: 200; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; color: white; cursor: pointer; padding: 5px 10px; font-size: 12px; font-family: inherit; }
  .legend { position: absolute; bottom: 20px; right: 20px; background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; z-index: 100; font-size: 11px; }
  .legend-title { color: var(--text2); margin-bottom: 8px; }
  .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; color: var(--text2); }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .roadview-hint { position: absolute; bottom: 20px; left: 20px; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: 11px; color: var(--text2); z-index: 100; }
  .map-popup { position: absolute; top: 16px; left: 16px; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 16px; min-width: 230px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); z-index: 200; display: none; }
  .popup-close { position: absolute; top: 10px; right: 12px; background: none; border: none; color: var(--text2); cursor: pointer; font-size: 20px; line-height: 1; }
  .popup-title { font-size: 15px; font-weight: 700; margin-bottom: 10px; padding-right: 20px; }
  .popup-row { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 6px; color: var(--text2); }
  .popup-row strong { color: var(--text); font-family: 'DM Mono', monospace; }
  .popup-roadview-btn { width: 100%; margin-top: 10px; background: rgba(79,142,247,0.15); border: 1px solid var(--accent); border-radius: 8px; color: var(--accent); cursor: pointer; padding: 8px; font-size: 12px; font-family: inherit; }
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 200px; color: var(--text2); font-size: 13px; gap: 8px; }
  .empty-icon { font-size: 32px; opacity: 0.3; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; display: none; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 24px; width: 480px; max-width: 95vw; max-height: 90vh; overflow-y: auto; }
  .modal h3 { font-size: 16px; margin-bottom: 20px; }
  .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }
  .form-group label { font-size: 12px; color: var(--text2); }
  .form-group input, .form-group select { background: var(--panel2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; font-family: inherit; padding: 9px 12px; outline: none; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .btn-primary { background: var(--accent); border: none; border-radius: 8px; color: white; cursor: pointer; padding: 10px 20px; font-size: 14px; font-family: inherit; font-weight: 500; }
  .btn-secondary { background: var(--panel2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); cursor: pointer; padding: 10px 20px; font-size: 14px; font-family: inherit; }
  input[type="file"] { display: none; }
  #loading { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; font-size: 16px; color: var(--text2); }
</style>
</head>
<body>

<div id="loading">🗺️ 지도 불러오는 중...</div>

<header>
  <div class="logo">🏢 실거래가 지도 <span>부동산 데이터 시각화</span></div>
  <div class="search-bar">
    <span style="color:var(--text2)">🔍</span>
    <input type="text" id="searchInput" placeholder="주소 검색...">
    <button onclick="searchAddress()">검색</button>
  </div>
  <div class="header-actions">
    <label class="btn" for="csvFile">📂 CSV 업로드</label>
    <input type="file" id="csvFile" accept=".csv" onchange="loadCSV(event)">
    <button class="btn" onclick="openAddModal()">＋ 직접 추가</button>
    <div class="stats-pill">총 <strong id="totalCount">0</strong>건</div>
  </div>
</header>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="section-title">필터</div>
      <div class="filter-group">
        <div class="filter-label">거래연도 <span id="yearLabel">전체</span></div>
        <div class="checkbox-group" id="yearChips"></div>
      </div>
      <div class="filter-group">
        <div class="filter-label">거래유형</div>
        <div class="checkbox-group">
          <div class="chip active" data-type="매매" onclick="toggleChip(this,'type')">매매</div>
          <div class="chip active" data-type="전세" onclick="toggleChip(this,'type')">전세</div>
          <div class="chip active" data-type="월세" onclick="toggleChip(this,'type')">월세</div>
        </div>
      </div>
      <div class="filter-group">
        <div class="filter-label">가격 상한 <span id="priceLabel">제한없음</span></div>
        <input type="range" class="range-slider" id="priceFilter" min="0" max="200000" step="1000" value="200000" oninput="updatePriceLabel(this.value);applyFilters()">
      </div>
      <div class="filter-group">
        <div class="filter-label">면적(㎡) 이상 <span id="areaLabel">제한없음</span></div>
        <input type="range" class="range-slider" id="areaFilter" min="0" max="300" step="5" value="0" oninput="updateAreaLabel(this.value);applyFilters()">
      </div>
      <div class="filter-group">
        <div class="filter-label">건물유형</div>
        <div class="checkbox-group">
          <div class="chip active" data-btype="아파트" onclick="toggleChip(this,'btype')">아파트</div>
          <div class="chip active" data-btype="오피스텔" onclick="toggleChip(this,'btype')">오피스텔</div>
          <div class="chip active" data-btype="빌라" onclick="toggleChip(this,'btype')">빌라</div>
          <div class="chip active" data-btype="단독주택" onclick="toggleChip(this,'btype')">단독주택</div>
          <div class="chip active" data-btype="상가" onclick="toggleChip(this,'btype')">상가</div>
          <div class="chip active" data-btype="기타" onclick="toggleChip(this,'btype')">기타</div>
        </div>
      </div>
    </div>
    <div class="list-header"><span>거래 목록</span><strong id="filteredCount">0</strong>건</div>
    <div class="csv-hint">CSV: <code>이름,주소,가격(만원),면적,연도,월,유형,건물유형,층,메모</code></div>
    <div class="deal-list" id="dealList">
      <div class="empty-state"><div class="empty-icon">🏘️</div><div>데이터를 추가해주세요</div></div>
    </div>
  </div>
  <div class="map-area">
    <div id="map"></div>
    <div class="roadview-panel" id="roadviewPanel">
      <div id="roadview"></div>
      <button class="roadview-close" onclick="closeRoadview()">✕ 로드뷰 닫기</button>
    </div>
    <div class="map-popup" id="mapPopup">
      <button class="popup-close" onclick="closePopup()">×</button>
      <div id="popupContent"></div>
      <button class="popup-roadview-btn" onclick="openRoadview()">🚶 로드뷰 보기</button>
    </div>
    <div class="legend">
      <div class="legend-title">가격대</div>
      <div class="legend-item"><div class="legend-dot" style="background:#4fc87a"></div> ~5억</div>
      <div class="legend-item"><div class="legend-dot" style="background:#4f8ef7"></div> 5억~10억</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f7c948"></div> 10억~20억</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f75a5a"></div> 20억+</div>
    </div>
    <div class="roadview-hint">📍 마커 클릭 → 로드뷰 가능</div>
  </div>
</div>

<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h3>거래 데이터 추가</h3>
    <div class="modal-grid">
      <div class="form-group full"><label>건물명</label><input type="text" id="f_name" placeholder="예: 래미안 퍼스티지"></div>
      <div class="form-group full"><label>주소</label><input type="text" id="f_addr" placeholder="예: 서울시 서초구 반포동 1-1"></div>
      <div class="form-group"><label>가격 (만원)</label><input type="number" id="f_price" placeholder="150000"></div>
      <div class="form-group"><label>면적 (㎡)</label><input type="number" id="f_area" placeholder="84"></div>
      <div class="form-group"><label>연도</label><input type="number" id="f_year" value="2024"></div>
      <div class="form-group"><label>월</label><input type="number" id="f_month" min="1" max="12" value="1"></div>
      <div class="form-group"><label>거래유형</label><select id="f_type"><option>매매</option><option>전세</option><option>월세</option></select></div>
      <div class="form-group"><label>건물유형</label><select id="f_btype"><option>아파트</option><option>오피스텔</option><option>빌라</option><option>단독주택</option><option>상가</option><option>기타</option></select></div>
      <div class="form-group"><label>층수</label><input type="number" id="f_floor" placeholder="10"></div>
      <div class="form-group"><label>메모</label><input type="text" id="f_memo" placeholder="선택사항"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeAddModal()">취소</button>
      <button class="btn-primary" onclick="addDeal()">추가하기</button>
    </div>
  </div>
</div>

<script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=a50dd085c496de471417e9af521ec366&libraries=services,roadview&autoload=false"></script>
<script>
let map, geocoder, roadviewClient, roadviewObj;
let allDeals = [], filteredDeals = [], markers = [];
let activeYears = new Set(), activeTypes = new Set(['매매','전세','월세']);
let activeBtypes = new Set(['아파트','오피스텔','빌라','단독주택','상가','기타']);
let selectedIdx = null, currentLat = null, currentLng = null;

window.onload = function() {
  kakao.maps.load(function() {
  document.getElementById('loading').style.display = 'none';

  map = new kakao.maps.Map(document.getElementById('map'), {
    center: new kakao.maps.LatLng(37.5665, 126.9780),
    level: 7
  });
  geocoder = new kakao.maps.services.Geocoder();
  roadviewClient = new kakao.maps.RoadviewClient();
  roadviewObj = new kakao.maps.Roadview(document.getElementById('roadview'));

  const samples = [
    { name: '래미안 반포 퍼스티지', addr: '서울특별시 서초구 반포동 1-1', price: 280000, area: 84, year: 2024, month: 3, type: '매매', btype: '아파트', floor: 12, memo: '' },
    { name: '헬리오시티', addr: '서울특별시 송파구 가락동 100', price: 195000, area: 99, year: 2024, month: 1, type: '매매', btype: '아파트', floor: 25, memo: '' },
    { name: '마포래미안푸르지오', addr: '서울특별시 마포구 아현동 686', price: 135000, area: 84, year: 2023, month: 11, type: '매매', btype: '아파트', floor: 8, memo: '' },
    { name: '광교 중흥S클래스', addr: '경기도 수원시 영통구 이의동 1319', price: 85000, area: 112, year: 2023, month: 6, type: '매매', btype: '아파트', floor: 15, memo: '' },
    { name: '강남역 오피스텔', addr: '서울특별시 강남구 역삼동 823', price: 65000, area: 42, year: 2024, month: 2, type: '전세', btype: '오피스텔', floor: 7, memo: '' },
    { name: '용산 파크타워', addr: '서울특별시 용산구 한강로2가 15', price: 310000, area: 115, year: 2024, month: 4, type: '매매', btype: '아파트', floor: 30, memo: '' },
    { name: '은평 뉴타운', addr: '서울특별시 은평구 진관동 70', price: 32000, area: 65, year: 2023, month: 3, type: '매매', btype: '빌라', floor: 3, memo: '' },
    { name: '판교 알파돔', addr: '경기도 성남시 분당구 백현동 532', price: 155000, area: 130, year: 2022, month: 9, type: '매매', btype: '오피스텔', floor: 20, memo: '' },
  ];

  let pending = samples.length;
  samples.forEach(function(d) {
    geocoder.addressSearch(d.addr, function(result, status) {
      if (status === kakao.maps.services.Status.OK) {
        d.lat = parseFloat(result[0].y);
        d.lng = parseFloat(result[0].x);
      } else { d.lat = null; d.lng = null; }
      allDeals.push(d);
      if (--pending === 0) { updateYearChips(); applyFilters(); }
    });
  });
  }); // kakao.maps.load
}; // window.onload

function priceColor(p) {
  if (p < 50000) return '#4fc87a';
  if (p < 100000) return '#4f8ef7';
  if (p < 200000) return '#f7c948';
  return '#f75a5a';
}
function priceLabel(p) { return p >= 10000 ? (p/10000).toFixed(1)+'억' : p.toLocaleString()+'만'; }

function renderMarkers() {
  markers.forEach(function(m){ m.setMap(null); });
  markers = [];
  filteredDeals.forEach(function(deal, idx) {
    if (!deal.lat) return;
    var color = priceColor(deal.price);
    var label = priceLabel(deal.price);
    var w = Math.max(56, label.length * 10 + 20);
    var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="'+w+'" height="36">'
      +'<rect x="0" y="0" width="'+w+'" height="26" rx="6" fill="'+color+'" opacity="0.95"/>'
      +'<polygon points="'+(w/2-6)+',26 '+(w/2+6)+',26 '+(w/2)+',34" fill="'+color+'" opacity="0.95"/>'
      +'<text x="'+(w/2)+'" y="17" text-anchor="middle" fill="white" font-size="11" font-weight="700" font-family="Noto Sans KR,sans-serif">'+label+'</text>'
      +'</svg>';
    var marker = new kakao.maps.Marker({
      map: map,
      position: new kakao.maps.LatLng(deal.lat, deal.lng),
      image: new kakao.maps.MarkerImage(
        'data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg),
        new kakao.maps.Size(w, 36),
        { offset: new kakao.maps.Point(w/2, 34) }
      )
    });
    (function(d, i){ kakao.maps.event.addListener(marker, 'click', function(){ showPopup(d, i); highlightList(i); }); })(deal, idx);
    markers.push(marker);
  });
}

function renderList() {
  var list = document.getElementById('dealList');
  document.getElementById('filteredCount').textContent = filteredDeals.length;
  document.getElementById('totalCount').textContent = allDeals.length;
  if (!filteredDeals.length) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><div>조건에 맞는 거래가 없습니다</div></div>';
    return;
  }
  list.innerHTML = filteredDeals.map(function(d, i) {
    return '<div class="deal-item'+(selectedIdx===i?' active':'')+'" onclick="clickListItem('+i+')">'
      +'<div class="deal-item-top"><div class="deal-name">'+d.name+'</div>'
      +'<div class="deal-price" style="color:'+priceColor(d.price)+'">'+priceLabel(d.price)+'</div></div>'
      +'<div class="deal-item-bottom">'
      +'<span class="deal-tag">'+d.year+'.'+String(d.month).padStart(2,'0')+'</span>'
      +'<span class="deal-tag">'+d.type+'</span>'
      +'<span class="deal-tag">'+d.btype+'</span>'
      +'<span class="deal-tag">'+d.area+'㎡</span>'
      +(d.floor ? '<span class="deal-tag">'+d.floor+'층</span>' : '')
      +'</div></div>';
  }).join('');
}

function showPopup(deal, idx) {
  currentLat = deal.lat; currentLng = deal.lng;
  document.getElementById('popupContent').innerHTML =
    '<div class="popup-title">'+deal.name+'</div>'
    +'<div class="popup-row">거래가격 <strong style="color:'+priceColor(deal.price)+'">'+priceLabel(deal.price)+'</strong></div>'
    +'<div class="popup-row">거래일 <strong>'+deal.year+'년 '+deal.month+'월</strong></div>'
    +'<div class="popup-row">유형 <strong>'+deal.type+' / '+deal.btype+'</strong></div>'
    +'<div class="popup-row">면적 <strong>'+deal.area+'㎡</strong></div>'
    +(deal.floor ? '<div class="popup-row">층수 <strong>'+deal.floor+'층</strong></div>' : '')
    +'<div style="font-size:11px;color:var(--text2);margin-top:6px">'+deal.addr+'</div>'
    +(deal.memo ? '<div style="font-size:11px;color:var(--text2);font-style:italic;margin-top:4px">'+deal.memo+'</div>' : '');
  document.getElementById('mapPopup').style.display = 'block';
}

function closePopup() { document.getElementById('mapPopup').style.display = 'none'; selectedIdx = null; renderList(); }

function clickListItem(i) {
  selectedIdx = i; renderList();
  var d = filteredDeals[i];
  if (d.lat) { map.panTo(new kakao.maps.LatLng(d.lat, d.lng)); map.setLevel(4); }
  showPopup(d, i);
}

function highlightList(i) {
  selectedIdx = i; renderList();
  var items = document.getElementById('dealList').querySelectorAll('.deal-item');
  if (items[i]) items[i].scrollIntoView({ block: 'nearest' });
}

function openRoadview() {
  if (!currentLat || !currentLng) return;
  var panel = document.getElementById('roadviewPanel');
  panel.classList.add('open');
  var pos = new kakao.maps.LatLng(currentLat, currentLng);
  roadviewClient.getNearestPanoId(pos, 50, function(panoId, status) {
    if (status === kakao.maps.services.Status.OK) {
      roadviewObj.setPanoId(panoId, pos);
    } else {
      alert('이 위치 근처에 로드뷰 데이터가 없습니다.');
      panel.classList.remove('open');
    }
  });
}
function closeRoadview() { document.getElementById('roadviewPanel').classList.remove('open'); }

function applyFilters() {
  var maxPrice = parseInt(document.getElementById('priceFilter').value);
  var minArea = parseInt(document.getElementById('areaFilter').value);
  filteredDeals = allDeals.filter(function(d) {
    return (activeYears.size === 0 || activeYears.has(d.year))
      && activeTypes.has(d.type) && activeBtypes.has(d.btype)
      && d.price <= maxPrice && d.area >= minArea;
  });
  renderMarkers(); renderList();
}

function updateYearChips() {
  var years = Array.from(new Set(allDeals.map(function(d){ return d.year; }))).sort(function(a,b){ return b-a; });
  activeYears = new Set(years);
  document.getElementById('yearChips').innerHTML = years.map(function(y){
    return '<div class="chip active" data-year="'+y+'" onclick="toggleChip(this,\'year\')">'+y+'</div>';
  }).join('');
  document.getElementById('yearLabel').textContent = '전체';
}

function toggleChip(el, group) {
  el.classList.toggle('active');
  if (group === 'year') {
    var y = parseInt(el.dataset.year);
    activeYears.has(y) ? activeYears.delete(y) : activeYears.add(y);
    var a = document.querySelectorAll('#yearChips .chip.active').length;
    var t = document.querySelectorAll('#yearChips .chip').length;
    document.getElementById('yearLabel').textContent = a === t ? '전체' : a+'개';
  } else if (group === 'type') {
    var tp = el.dataset.type; activeTypes.has(tp) ? activeTypes.delete(tp) : activeTypes.add(tp);
  } else if (group === 'btype') {
    var b = el.dataset.btype; activeBtypes.has(b) ? activeBtypes.delete(b) : activeBtypes.add(b);
  }
  applyFilters();
}

function updatePriceLabel(v) { document.getElementById('priceLabel').textContent = v >= 200000 ? '제한없음' : priceLabel(parseInt(v)); }
function updateAreaLabel(v) { document.getElementById('areaLabel').textContent = v == 0 ? '제한없음' : v+'㎡'; }

function searchAddress() {
  var q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  geocoder.addressSearch(q, function(result, status) {
    if (status === kakao.maps.services.Status.OK) {
      map.panTo(new kakao.maps.LatLng(result[0].y, result[0].x)); map.setLevel(4);
    } else { alert('주소를 찾을 수 없습니다.'); }
  });
}
document.getElementById('searchInput').addEventListener('keydown', function(e){ if(e.key==='Enter') searchAddress(); });

function openAddModal() { document.getElementById('addModal').classList.add('open'); }
function closeAddModal() { document.getElementById('addModal').classList.remove('open'); }

function addDeal() {
  var deal = {
    name: document.getElementById('f_name').value.trim() || '이름없음',
    addr: document.getElementById('f_addr').value.trim(),
    price: parseInt(document.getElementById('f_price').value) || 0,
    area: parseFloat(document.getElementById('f_area').value) || 0,
    year: parseInt(document.getElementById('f_year').value) || 2024,
    month: parseInt(document.getElementById('f_month').value) || 1,
    type: document.getElementById('f_type').value,
    btype: document.getElementById('f_btype').value,
    floor: parseInt(document.getElementById('f_floor').value) || null,
    memo: document.getElementById('f_memo').value.trim()
  };
  if (!deal.addr) { alert('주소를 입력해주세요.'); return; }
  geocoder.addressSearch(deal.addr, function(result, status) {
    if (status === kakao.maps.services.Status.OK) {
      deal.lat = parseFloat(result[0].y); deal.lng = parseFloat(result[0].x);
      map.panTo(new kakao.maps.LatLng(deal.lat, deal.lng)); map.setLevel(4);
    } else { deal.lat = null; deal.lng = null; alert('주소를 찾지 못했습니다.'); }
    allDeals.push(deal); updateYearChips(); applyFilters(); closeAddModal();
  });
}

function loadCSV(event) {
  var file = event.target.files[0]; if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var lines = e.target.result.trim().split('\n');
    var data = lines[0].includes('이름') ? lines.slice(1) : lines;
    var pending = data.length, added = 0;
    data.forEach(function(line) {
      var cols = line.split(',').map(function(c){ return c.trim().replace(/^"|"$/g,''); });
      if (cols.length < 3) { if(--pending===0){updateYearChips();applyFilters();alert(added+'건 추가됐습니다.');} return; }
      var deal = { name:cols[0]||'이름없음', addr:cols[1]||'', price:parseInt(cols[2])||0, area:parseFloat(cols[3])||0, year:parseInt(cols[4])||2024, month:parseInt(cols[5])||1, type:cols[6]||'매매', btype:cols[7]||'기타', floor:parseInt(cols[8])||null, memo:cols[9]||'' };
      if (!deal.addr) { if(--pending===0){updateYearChips();applyFilters();alert(added+'건 추가됐습니다.');} return; }
      geocoder.addressSearch(deal.addr, function(result, status) {
        deal.lat = status===kakao.maps.services.Status.OK ? parseFloat(result[0].y) : null;
        deal.lng = status===kakao.maps.services.Status.OK ? parseFloat(result[0].x) : null;
        allDeals.push(deal); added++;
        if (--pending === 0) { updateYearChips(); applyFilters(); alert(added+'건 추가됐습니다.'); }
      });
    });
  };
  reader.readAsText(file, 'utf-8'); event.target.value = '';
}
</script>
</body>
